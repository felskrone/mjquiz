# Taskfile für Minecraft Quiz - Lokale Entwicklung
# https://taskfile.dev

version: '3'

vars:
  APP_MODULE: quiz.anwendung
  PORT: 5000

tasks:
  install:
    desc: Abhängigkeiten installieren
    cmds:
      - echo "📦 Installiere Abhängigkeiten..."
      - uv venv
      - uv pip install -e .
      - echo "✅ Installation abgeschlossen!"
    silent: true

  run:
    desc: Anwendung starten
    cmds:
      - echo "🚀 Starte Anwendung auf http://localhost:{{.PORT}}"
      - uv run python3 -m {{.APP_MODULE}}
    silent: true

  dev:
    desc: Anwendung im Entwicklungsmodus starten (mit Auto-Reload)
    cmds:
      - echo "🔧 Starte Entwicklungsmodus mit Auto-Reload..."
      - echo "📁 Überwache Änderungen in quiz/ Ordner"
      - FLASK_ENV=development FLASK_DEBUG=1 uv run python -m {{.APP_MODULE}}
    silent: true

  test:
    desc: Health Check durchführen
    cmds:
      - echo "🏥 Führe Health Check durch..."
      - curl -s http://localhost:{{.PORT}}/health | python -m json.tool || echo "❌ Health Check fehlgeschlagen"
    silent: true

  clean:
    desc: Generierte Dateien entfernen
    cmds:
      - echo "🧹 Räume auf..."
      - rm -rf __pycache__ quiz/__pycache__ quiz/highscores.txt
      - rm -rf .pytest_cache .coverage htmlcov
      - echo "✅ Aufgeräumt!"
    silent: true

  setup:
    desc: Komplettes Setup (venv + install + env)
    cmds:
      - echo "⚙️  Erstelle virtuelle Umgebung..."
      - uv venv
      - echo "📦 Installiere Abhängigkeiten..."
      - uv pip install -e .
      - echo "📝 Erstelle .env Datei..."
      - cp .env.example .env
      - echo "✅ Setup abgeschlossen!"
    silent: true

  generate-key:
    desc: Sicheren SECRET_KEY generieren
    cmds:
      - echo "🔐 Generiere SECRET_KEY..."
      - uv run python3 -c "import secrets; print('SECRET_KEY=' + secrets.token_hex(32))"
      - echo ""
      - echo "💡 Kopiere die Zeile oben in deine .env Datei"
    silent: true

  check:
    desc: Code-Qualität prüfen
    cmds:
      - echo "🔍 Prüfe Code..."
      - uv run python3 -m py_compile quiz/anwendung.py quiz/datenbank.py quiz/quiz_lader.py
      - echo "✅ Keine Syntax-Fehler gefunden!"
    silent: true

  info:
    desc: Projekt-Informationen anzeigen
    cmds:
      - echo "📊 Projekt-Informationen"
      - echo "   Name - Minecraft Quiz"
      - echo "   Modul - {{.APP_MODULE}}"
      - echo "   Port - {{.PORT}}"
      - echo "   URL - http://localhost:{{.PORT}}"
      - uv run python --version
      - echo ""
    silent: true

  build:
    desc: Paket mit allen Assets erstellen (erstellt build/ Ordner)
    cmds:
      - echo "🏗️  Erstelle Build-Paket..."
      - uv pip install build wheel
      - uv run python -m build
      - echo "✅ Build abgeschlossen!"
      - echo ""
      - echo "📦 Erstellt:"
      - ls -lh dist/
      - echo ""
      - echo "📁 Build-Ordner:"
      - ls -lh build/
    silent: true

  build-clean:
    desc: Build-Artefakte entfernen
    cmds:
      - echo "🧹 Entferne Build-Artefakte..."
      - rm -rf build/ dist/ *.egg-info quiz/*.egg-info
      - echo "✅ Build-Artefakte entfernt!"
    silent: true

  docker-build-linux:
    desc: Docker-Image bauen
    cmds:
      - echo "🐳 Baue Docker-Image..."
      - docker build -t felskrone/mjquiz:latest --platform linux/amd64 .
      - echo "✅ Docker-Image gebaut!"
    silent: true

  docker-build-local:
    desc: Docker-Image bauen
    cmds:
      - echo "🐳 Baue Docker-Image..."
      - docker build -t felskrone/mjquiz:latest .
      - echo "✅ Docker-Image gebaut!"
    silent: true


  docker-push:
    desc: Docker-Image auf Docker Hub pushen
    cmds:
      - echo "🐳 Pushe Docker-Image auf Docker Hub..."
      - docker push felskrone/mjquiz:latest