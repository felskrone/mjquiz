version: '3.8'

services:
  minecraft-quiz:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: minecraft-quiz
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key-in-production}
      - FLASK_ENV=production
    volumes:
      # Persistiere Highscores außerhalb des Containers
      - ./data:/app/data
      # Optional: Mount für Entwicklung (auskommentiert)
      # - ./quiz:/app/quiz
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - quiz-network

networks:
  quiz-network:
    driver: bridge

volumes:
  quiz-data:
    driver: local